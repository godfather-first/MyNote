name: Build MyNote APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    env:
      ANDROID_API: "35"
      ANDROID_BUILD_TOOLS: "35.0.0"
      ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
      ANDROIDSDK: /home/runner/.buildozer/android/platform/android-sdk

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Show runtime versions
        run: |
          set -eux
          java -version
          python --version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Install Linux build dependencies
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            build-essential \
            ccache \
            cmake \
            gettext \
            git \
            libffi-dev \
            libltdl-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libsqlite3-dev \
            libssl-dev \
            libtinfo6 \
            libtool \
            openjdk-17-jdk \
            patch \
            pkg-config \
            unzip \
            xvfb \
            zip \
            zlib1g-dev

      - name: Locate Buildozer project
        id: locate
        shell: bash
        run: |
          set -eux
          project_dir="$(find "$GITHUB_WORKSPACE" -name buildozer.spec -type f -printf '%h\n' | head -n 1)"
          test -n "$project_dir"
          echo "project_dir=$project_dir" >> "$GITHUB_OUTPUT"
          echo "Buildozer project: $project_dir"

      - name: Install Android command line tools
        shell: bash
        run: |
          set -eux
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          curl -fsSL \
            -o "$RUNNER_TEMP/android-commandlinetools.zip" \
            https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q "$RUNNER_TEMP/android-commandlinetools.zip" -d "$RUNNER_TEMP/android-tools"
          mv "$RUNNER_TEMP/android-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"

          # Buildozer still checks this legacy location on some versions.
          mkdir -p "$ANDROID_SDK_ROOT/tools"
          cp -a "$ANDROID_SDK_ROOT/cmdline-tools/latest/." "$ANDROID_SDK_ROOT/tools/"

          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/tools/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

      - name: Accept Android SDK licenses
        shell: bash
        run: |
          set -eux
          mkdir -p "$ANDROID_SDK_ROOT/licenses"
          printf '%s\n' \
            '24333f8a63b6825ea9c5514f83c2829b004d1fee' \
            '8933bad161af4178b1185d1a37fbf41ea5269c55' \
            > "$ANDROID_SDK_ROOT/licenses/android-sdk-license"
          printf '%s\n' \
            '84831b9409646a918e30573bab4c9c91346d8abd' \
            > "$ANDROID_SDK_ROOT/licenses/android-sdk-preview-license"
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || true

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -eux
          sdkmanager --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" \
            "platforms;android-${ANDROID_API}" \
            "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Cache Buildozer downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle
            ~/.cache/pip
            ~/.buildozer
            ${{ steps.locate.outputs.project_dir }}/.buildozer
          key: mynote-buildozer-v2-${{ runner.os }}-${{ hashFiles('**/buildozer.spec') }}
          restore-keys: |
            mynote-buildozer-v2-${{ runner.os }}-

      - name: Install Buildozer
        run: |
          set -eux
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "cython<3" buildozer pytest
          python -m pip install -r "${{ steps.locate.outputs.project_dir }}/requirements.txt"

      - name: Run tests before packaging
        shell: bash
        env:
          KIVY_NO_ARGS: "1"
        run: |
          set -eux
          xvfb-run -a python -m pytest -q "$GITHUB_WORKSPACE/tests"

      - name: Build debug APK
        working-directory: ${{ steps.locate.outputs.project_dir }}
        shell: bash
        run: |
          set -euxo pipefail
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/tools/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          export JAVA_HOME="${JAVA_HOME_17_X64:-$JAVA_HOME}"
          java -version
          buildozer android clean || true
          buildozer -v android debug 2>&1 | tee buildozer-full.log

      - name: Upload Buildozer logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-failure-logs
          path: |
            ${{ steps.locate.outputs.project_dir }}/buildozer-full.log
            ${{ steps.locate.outputs.project_dir }}/.buildozer/**/*.log
            ${{ steps.locate.outputs.project_dir }}/.buildozer/android/platform/python-for-android/**/*.log
          if-no-files-found: ignore

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyNote-debug-apk
          path: ${{ steps.locate.outputs.project_dir }}/bin/*.apk
          if-no-files-found: error
