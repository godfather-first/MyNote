name: Build MyNote APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Locate Buildozer project
        id: locate
        shell: bash
        run: |
          set -e
          PROJECT_DIR="$(find "$GITHUB_WORKSPACE" -name buildozer.spec -type f -printf '%h\n' | head -n 1)"
          if [ -z "$PROJECT_DIR" ]; then
            echo "No buildozer.spec found"
            find "$GITHUB_WORKSPACE" -maxdepth 5 -type f | sort
            exit 1
          fi
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Found project at: $PROJECT_DIR"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ${{ steps.locate.outputs.project_dir }}/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('**/buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install buildozer cython

      - name: Install Android command-line tools
        run: |
          set -e
          SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          TOOLS_ZIP="$RUNNER_TEMP/commandlinetools-linux.zip"
          TOOLS_DIR="$RUNNER_TEMP/android-commandline-tools"

          mkdir -p "$SDK_ROOT" "$TOOLS_DIR"
          curl -fsSL \
            -o "$TOOLS_ZIP" \
            https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q "$TOOLS_ZIP" -d "$TOOLS_DIR"

          rm -rf "$SDK_ROOT/cmdline-tools/latest" "$SDK_ROOT/tools"
          mkdir -p "$SDK_ROOT/cmdline-tools"
          mv "$TOOLS_DIR/cmdline-tools" "$SDK_ROOT/cmdline-tools/latest"

          # Buildozer 1.6 still probes this legacy path.
          cp -a "$SDK_ROOT/cmdline-tools/latest" "$SDK_ROOT/tools"

          echo "$SDK_ROOT/tools/bin" >> "$GITHUB_PATH"
          echo "$SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

      - name: Pre-accept Android SDK licenses
        run: |
          SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_ROOT/licenses"
          printf '%s\n' \
            '24333f8a63b6825ea9c5514f83c2829b004d1fee' \
            '8933bad161af4178b1185d1a37fbf41ea5269c55' \
            > "$SDK_ROOT/licenses/android-sdk-license"
          printf '%s\n' \
            '84831b9409646a918e30573bab4c9c91346d8abd' \
            > "$SDK_ROOT/licenses/android-sdk-preview-license"

          yes | "$SDK_ROOT/tools/bin/sdkmanager" --sdk_root="$SDK_ROOT" --licenses >/dev/null || true
          "$SDK_ROOT/tools/bin/sdkmanager" --sdk_root="$SDK_ROOT" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Build APK
        working-directory: ${{ steps.locate.outputs.project_dir }}
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyNote-debug-apk
          path: ${{ steps.locate.outputs.project_dir }}/bin/*.apk
          if-no-files-found: error
