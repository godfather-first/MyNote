name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Locate MyNote project
        id: locate
        shell: bash
        run: |
          set -e
          PROJECT_DIR="$(find "$GITHUB_WORKSPACE" -name buildozer.spec -type f -printf '%h\n' | head -n 1)"
          if [ -z "$PROJECT_DIR" ]; then
            echo "No buildozer.spec found"
            find "$GITHUB_WORKSPACE" -maxdepth 4 -type f | sort
            exit 1
          fi
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Found project at: $PROJECT_DIR"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('**/buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Cache project build directory
        uses: actions/cache@v4
        with:
          path: ${{ steps.locate.outputs.project_dir }}/.buildozer
          key: project-buildozer-${{ runner.os }}-${{ hashFiles('**/buildozer.spec') }}
          restore-keys: |
            project-buildozer-${{ runner.os }}-

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install buildozer cython

      - name: Build APK
        working-directory: ${{ steps.locate.outputs.project_dir }}
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyNote-debug-apk
          path: ${{ steps.locate.outputs.project_dir }}/bin/*.apk
          if-no-files-found: error

